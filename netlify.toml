[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

# Disable Netlify's asset post-processing — Astro/Vite handles bundling
[build.processing]
  skip_processing = false
[build.processing.js]
  bundle = false
  minify = false
[build.processing.css]
  bundle = false
  minify = false
